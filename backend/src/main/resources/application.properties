spring.application.name=backend
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/collide_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

management.endpoints.web.exposure.include=health,info

collide.dev.default-user=jesseyo
collide.security.require-auth=false
collide.jwt.secret=${JWT_SECRET:collide-local-development-secret-key-change-before-production-1234567890}
collide.jwt.expiration-minutes=10080
collide.upload-dir=uploads
